name: Cross-Platform Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS x86_64 (Intel)
          - platform: 'macos-x86_64'
            runner: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_target: x86_64-apple-darwin

          # macOS ARM64 (Apple Silicon)
          - platform: 'macos-aarch64'
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_target: aarch64-apple-darwin

          # Windows x86_64
          - platform: 'windows-x86_64'
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc

          # Linux x86_64
          - platform: 'linux-x86_64'
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.rust_target }}-${{ hashFiles('**/Cargo.lock') }}
          shared-key: ${{ matrix.rust_target }}
          cache-on-failure: true

      # ============================================================
      # Linux Dependencies
      # ============================================================
      - name: Install Linux dependencies
        if: matrix.platform == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ============================================================
      # macOS Code Signing and Notarization
      # ============================================================
      - name: Import Apple Code Signing Certificate
        if: runner.os == 'macOS'
        continue-on-error: true
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify Apple Certificate Import
        if: runner.os == 'macOS'
        run: |
          CERT_IMPORTED=false

          # Check if certificate was imported
          if security find-identity -v -p codesigning | grep -q "Developer ID Application"; then
            CERT_IMPORTED=true
            echo "✓ Apple Developer ID certificate found"
            security find-identity -v -p codesigning | grep "Developer ID Application"
          else
            echo "⚠ No Developer ID certificate found - will use ad-hoc signing"
          fi

          echo "APPLE_CERT_IMPORTED=$CERT_IMPORTED" >> $GITHUB_ENV
        shell: bash

      # ============================================================
      # Install Dependencies and Build
      # ============================================================
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
          # macOS Code Signing (uses env variables from certificate import)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri will use these for signing and notarization automatically
        with:
          args: --target ${{ matrix.tauri_target }}

      # ============================================================
      # Additional macOS Signing/Notarization (if Tauri didn't handle it)
      # ============================================================
      - name: Code sign and notarize macOS app (post-build)
        if: runner.os == 'macOS' && env.APPLE_CERT_IMPORTED == 'true'
        run: |
          echo "Checking if additional signing is needed..."

          # Find the .app bundle
          APP_PATH=$(find src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "⚠ No .app bundle found, skipping additional signing"
            exit 0
          fi

          echo "Found app: $APP_PATH"

          # Check if already signed
          if codesign -v "$APP_PATH" 2>/dev/null; then
            echo "✓ App already properly signed by Tauri"

            # Verify and notarize
            echo "Verifying signature..."
            codesign -vvv --deep --strict "$APP_PATH"

            # Create zip for notarization
            APP_NAME=$(basename "$APP_PATH")
            cd "$(dirname "$APP_PATH")"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "${APP_NAME%.app}-notarize.zip"

            echo "Submitting for notarization..."
            xcrun notarytool submit "${APP_NAME%.app}-notarize.zip" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_ID_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait \
              --timeout 30m

            # Staple notarization ticket
            xcrun stapler staple "$APP_PATH"

            echo "✓ App signed, notarized, and stapled"
          else
            echo "Signing app with Developer ID..."
            codesign --deep --force --verify --verbose \
              --timestamp --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              "$APP_PATH"

            codesign -vvv --deep --strict "$APP_PATH"

            # Notarize
            APP_NAME=$(basename "$APP_PATH")
            cd "$(dirname "$APP_PATH")"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "${APP_NAME%.app}-notarize.zip"

            xcrun notarytool submit "${APP_NAME%.app}-notarize.zip" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_ID_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait \
              --timeout 30m

            xcrun stapler staple "$APP_PATH"
            echo "✓ Manual signing, notarization, and stapling complete"
          fi
        shell: bash

      - name: Ad-hoc sign macOS app (fallback)
        if: runner.os == 'macOS' && env.APPLE_CERT_IMPORTED != 'true'
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos -name "*.app" -type d | head -n 1)

          if [ -n "$APP_PATH" ]; then
            echo "Using ad-hoc signature (no Developer ID configured)..."
            codesign --remove-signature "$APP_PATH" || true
            codesign -s - --deep --force "$APP_PATH"
            codesign -v "$APP_PATH"
            echo "⚠ App ad-hoc signed (users may see Gatekeeper warning)"
          fi
        shell: bash

      # ============================================================
      # Prepare Release Artifacts
      # ============================================================
      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          # Find MSI and EXE files
          Get-ChildItem -Path "src-tauri/target/${{ matrix.rust_target }}/release/bundle" -Recurse -Include *.msi,*.exe | ForEach-Object {
            $destName = "turbomcpstudio-${{ matrix.rust_target }}-" + $_.Name
            Copy-Item $_.FullName "artifacts/$destName"

            # Generate SHA256
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $destName" | Out-File -FilePath "artifacts/$destName.sha256" -Encoding ascii -NoNewline

            Write-Host "Packaged: $destName"
          }

          Write-Host "`nArtifacts:"
          Get-ChildItem artifacts | Format-Table Name, Length
        shell: pwsh

      - name: Prepare artifacts (Linux)
        if: matrix.platform == 'linux-x86_64'
        run: |
          mkdir -p artifacts

          # Find AppImage and deb files
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) | while read file; do
            filename=$(basename "$file")
            destname="turbomcpstudio-${{ matrix.rust_target }}-${filename}"
            cp "$file" "artifacts/$destname"
            chmod +x "artifacts/$destname" 2>/dev/null || true

            # Generate SHA256
            sha256sum "$file" | awk '{print $1 "  '"$destname"'"}' > "artifacts/$destname.sha256"

            echo "Packaged: $destname"
          done

          echo -e "\nArtifacts:"
          ls -lh artifacts/
        shell: bash

      - name: Prepare artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts

          # Find DMG files
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle -type f -name "*.dmg" | while read file; do
            filename=$(basename "$file")
            destname="turbomcpstudio-${{ matrix.rust_target }}-${filename}"
            cp "$file" "artifacts/$destname"

            # Generate SHA256
            sha256sum "$file" | awk '{print $1 "  '"$destname"'"}' > "artifacts/$destname.sha256"

            echo "Packaged: $destname"
          done

          # If no DMG, package the .app as tar.gz
          if [ ! "$(ls -A artifacts/*.dmg 2>/dev/null)" ]; then
            echo "No DMG found, packaging .app bundle..."
            APP_PATH=$(find src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos -name "*.app" -type d | head -n 1)
            if [ -n "$APP_PATH" ]; then
              APP_NAME=$(basename "$APP_PATH")
              DEST_NAME="turbomcpstudio-${{ matrix.rust_target }}-${APP_NAME%.app}.tar.gz"
              tar -czf "artifacts/$DEST_NAME" -C "$(dirname "$APP_PATH")" "$APP_NAME"
              sha256sum "artifacts/$DEST_NAME" > "artifacts/$DEST_NAME.sha256"
              echo "Packaged: $DEST_NAME"
            fi
          fi

          echo -e "\nArtifacts:"
          ls -lh artifacts/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 1

  # ============================================================
  # Create GitHub Release
  # ============================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p final-release

          # Copy all artifacts
          find release-artifacts -type f \( -name "*.dmg" -o -name "*.tar.gz" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" -o -name "*.exe" \) -exec cp {} final-release/ \;

          # Copy SHA256 files
          find release-artifacts -name "*.sha256" -type f -exec cp {} final-release/ \;

          echo "Final release contents:"
          ls -lah final-release/
        shell: bash

      - name: Generate combined checksums
        run: |
          cd final-release
          # Generate SHA256SUMS for all release files
          sha256sum *.dmg *.tar.gz *.AppImage *.deb *.msi *.exe 2>/dev/null | grep -v "No such file" > SHA256SUMS || true
          cat SHA256SUMS
        shell: bash

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: 'TurboMCP Studio ${{ steps.version.outputs.version }}'
          files: |
            final-release/*.dmg
            final-release/*.tar.gz
            final-release/*.AppImage
            final-release/*.deb
            final-release/*.msi
            final-release/*.exe
            final-release/*.sha256
            final-release/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

# cargo-audit advisory ignore list
#
# All entries are transitive dependencies that cannot be fixed without upstream changes.
# Reviewed: 2026-03-16

[advisories]
ignore = [
    # ── Tauri 2.x → wry → gtk3 (GTK3 bindings unmaintained) ──
    # GTK4 migration tracked: https://github.com/tauri-apps/tauri/issues/7335
    "RUSTSEC-2024-0370", # proc-macro-error (via gtk3-macros)
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    "RUSTSEC-2024-0429", # glib (VariantStrIter unsoundness)

    # ── Tauri → tauri-utils → urlpattern → unic-* (unmaintained) ──
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident

    # ── Tauri → tauri-utils → kuchikiki → selectors → fxhash ──
    "RUSTSEC-2025-0057", # fxhash (unmaintained)

    # ── sqlx lockfile includes sqlx-mysql → rsa (never compiled, sqlite only) ──
    "RUSTSEC-2023-0071", # rsa (Marvin Attack — no fix available upstream)

    # ── turbomcp-auth → lru ──
    "RUSTSEC-2026-0002", # lru (Stacked Borrows violation in IterMut)
]
